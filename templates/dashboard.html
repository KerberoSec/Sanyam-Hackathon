<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HabitFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/dashboard">
                <i class="fas fa-rocket"></i> HabitFlow
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="ms-auto d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center gap-2">
                        <span id="userLevel" class="badge bg-primary">Lvl 1</span>
                        <span id="userXP" class="badge bg-success">0 XP</span>
                    </div>
                    <div class="dropdown">
                        <button class="btn btn-outline-light dropdown-toggle" type="button" id="userMenu" data-bs-toggle="dropdown">
                            <i class="fas fa-user"></i> <span id="userName">User</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
                            <li><a class="dropdown-item" href="#" onclick="toggleDarkMode()"><i class="fas fa-moon"></i> Dark Mode</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid py-4">
        <!-- Dashboard Header -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h1 class="display-6">Dashboard</h1>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newHabitModal">
                        <i class="fas fa-plus"></i> New Habit
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row mb-4 g-3">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                        🔥
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Streak Days</div>
                        <div class="stat-value" id="streakDays">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
                        ✅
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Completions</div>
                        <div class="stat-value" id="totalCompletions">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
                        📊
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Consistency</div>
                        <div class="stat-value" id="consistency">0%</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #fa709a, #fee140);">
                        🎮
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Total Habits</div>
                        <div class="stat-value" id="totalHabits">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Motivational Message & Coach Message -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="alert alert-info alert-dismissible fade show d-flex align-items-center" id="coachMessage" style="display: none;">
                    <i class="fas fa-lightbulb me-3"></i>
                    <div id="coachText"></div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            </div>
        </div>

        <!-- Habits Section -->
        <div class="row mb-4">
            <div class="col-lg-8">
                <h3 class="mb-3">Today's Habits</h3>
                <div id="habitsList" class="habit-list">
                    <div class="text-center py-5 text-muted">
                        <p>Create your first habit to get started!</p>
                    </div>
                </div>
            </div>

            <!-- Mood Tracker Sidebar -->
            <div class="col-lg-4">
                <h3 class="mb-3">How are you feeling?</h3>
                <div class="mood-tracker">
                    <div class="mood-option" onclick="logMood('happy')">
                        <div class="mood-emoji">😊</div>
                        <div class="mood-label">Happy</div>
                    </div>
                    <div class="mood-option" onclick="logMood('neutral')">
                        <div class="mood-emoji">😐</div>
                        <div class="mood-label">Neutral</div>
                    </div>
                    <div class="mood-option" onclick="logMood('sad')">
                        <div class="mood-emoji">😢</div>
                        <div class="mood-label">Sad</div>
                    </div>
                </div>
                <div id="moodFeedback" class="mt-3 text-center text-muted"></div>

                <!-- Badges Section -->
                <h5 class="mt-4 mb-3">Achievements</h5>
                <div id="badgesList" class="badges-container"></div>
            </div>
        </div>

        <!-- Analytics Section -->
        <div class="row g-3">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Completion Rate</h5>
                        <canvas id="completionChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Mood Distribution</h5>
                        <canvas id="moodChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Habit Modal -->
    <div class="modal fade" id="newHabitModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Habit</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="newHabitForm">
                        <div class="mb-3">
                            <label for="habitTitle" class="form-label">Habit Name</label>
                            <input type="text" class="form-control" id="habitTitle" required>
                        </div>
                        <div class="mb-3">
                            <label for="habitCategory" class="form-label">Category</label>
                            <select class="form-select" id="habitCategory">
                                <option value="health">Health</option>
                                <option value="fitness">Fitness</option>
                                <option value="learning">Learning</option>
                                <option value="productivity">Productivity</option>
                                <option value="general">General</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="habitIcon" class="form-label">Icon</label>
                            <input type="text" class="form-control" id="habitIcon" value="✨" maxlength="3">
                        </div>
                        <div class="mb-3">
                            <label for="habitFrequency" class="form-label">Frequency</label>
                            <div id="frequencyOptions" class="d-flex flex-wrap gap-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="freq-mon" value="monday" checked>
                                    <label class="form-check-label" for="freq-mon">Mon</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="freq-tue" value="tuesday" checked>
                                    <label class="form-check-label" for="freq-tue">Tue</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="freq-wed" value="wednesday" checked>
                                    <label class="form-check-label" for="freq-wed">Wed</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="freq-thu" value="thursday" checked>
                                    <label class="form-check-label" for="freq-thu">Thu</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="freq-fri" value="friday" checked>
                                    <label class="form-check-label" for="freq-fri">Fri</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="freq-sat" value="saturday">
                                    <label class="form-check-label" for="freq-sat">Sat</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="freq-sun" value="sunday">
                                    <label class="form-check-label" for="freq-sun">Sun</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createHabit()">Create Habit</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confetti Animation -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
